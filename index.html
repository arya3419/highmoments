<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HighMoments | World Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pink: #ff007f; --violet: #7000ff; --soft-bg: #f8fafc; }
        body { margin: 0; padding: 0; background-color: var(--soft-bg); color: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Wonders Section */
        .wonders-section {
            width: 100%; overflow-x: auto; white-space: nowrap;
            padding: 30px 20px; background: white; border-bottom: 1px solid #e2e8f0;
        }
        .wonders-section::-webkit-scrollbar { display: none; }
        .wonder-item {
            display: inline-block; width: 320px; height: 220px;
            margin-right: 20px; border-radius: 24px;
            overflow: hidden; position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .wonder-item img { width: 100%; height: 100%; object-fit: cover; background: #eee; }
        .wonder-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white; font-size: 0.85rem; font-weight: 700;
        }

        header { padding: 60px 20px 40px; text-align: center; }
        h1 { 
            font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 4.5rem); margin: 0; 
            background: linear-gradient(to right, var(--pink), var(--violet));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px 100px; }
        .input-wrapper {
            background: white; padding: 30px; border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; margin-bottom: 60px;
        }
        textarea { width: 100%; border: none; font-size: 1.3rem; outline: none; resize: none; font-family: inherit; min-height: 80px; }
        .publish-btn {
            background: linear-gradient(135deg, var(--pink), var(--violet));
            color: white; border: none; padding: 16px 45px; border-radius: 100px;
            font-weight: 700; cursor: pointer; float: right; transition: 0.3s;
        }
        .feed-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .moment-card {
            background: white; padding: 30px; border-radius: 28px;
            border: 1px solid #f1f5f9; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .card-footer { font-size: 0.75rem; font-weight: 700; color: var(--pink); text-transform: uppercase; }
    </style>
</head>
<body>

<div class="wonders-section">
    <div class="wonder-item">
        <img src="https://images.unsplash.com/photo-1564507592333-c60657451dd7?auto=format&fit=crop&w=600&q=80" alt="Taj Mahal">
        <div class="wonder-label">Taj Mahal, India</div>
    </div>
    <div class="wonder-item">
        <img src="https://images.unsplash.com/photo-1508804185872-d7badad00f7d?auto=format&fit=crop&w=600&q=80" alt="Great Wall">
        <div class="wonder-label">Great Wall, China</div>
    </div>
    <div class="wonder-item">
        <img src="https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=600&q=80" alt="Colosseum">
        <div class="wonder-label">The Colosseum, Italy</div>
    </div>
    <div class="wonder-item">
        <img src="https://images.unsplash.com/photo-1548115184-bc6544d06a58?auto=format&fit=crop&w=600&q=80" alt="Petra">
        <div class="wonder-label">Petra, Jordan</div>
    </div>
    <div class="wonder-item">
        <img src="https://images.unsplash.com/photo-1526392060635-9d6019884377?auto=format&fit=crop&w=600&q=80" alt="Machu Picchu">
        <div class="wonder-label">Machu Picchu, Peru</div>
    </div>
    <div class="wonder-item">
        <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=600&q=80" alt="Chichen Itza">
        <div class="wonder-label">Chichen Itza, Mexico</div>
    </div>
    <div class="wonder-item">
        <img src="https://images.unsplash.com/photo-1591533512217-0630b9609f67?auto=format&fit=crop&w=600&q=80" alt="Christ the Redeemer">
        <div class="wonder-label">Christ the Redeemer, Brazil</div>
    </div>
</div>

<header>
    <h1>HighMoments</h1>
    <p style="color: #64748b; font-weight: 500;">Capturing global wonders daily</p>
</header>

<div class="container">
    <div class="input-wrapper">
        <textarea id="momentInput" placeholder="What's a wonder you saw today?"></textarea>
        <button class="publish-btn" onclick="publish()">Publish Moment</button>
        <div style="clear:both;"></div>
    </div>
    <div id="feed" class="feed-grid"></div>
</div>

<script>
    const supabase = lib.createClient('https://qbkyjuygpcusvxnjlgyr.supabase.co', 'sb_publishable_RbRR4Pn2afNtc0Uaa2CsNw_Ordgv_7T');

    async function load() {
        const { data } = await supabase.from('moments').select('*').order('id', { ascending: false });
        if (data) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            data.forEach(m => {
                const card = document.createElement('div');
                card.className = 'moment-card';
                card.innerHTML = `<p>${m.text}</p><div class="card-footer">VERIFIED ARCHIVE</div>`;
                feed.appendChild(card);
            });
        }
    }

    async function publish() {
        const input = document.getElementById('momentInput');
        const val = input.value;
        if (!val.trim()) return;
        const { error } = await supabase.from('moments').insert([{ text: val }]);
        if (!error) { input.value = ''; load(); }
    }
    load();
</script>

</body>
</html>
