<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HighMoments | Global Wonders</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pink: #ff007f; --violet: #7000ff; }
        body { margin: 0; padding: 0; background-color: #ffffff; color: #1a1a1a; font-family: 'Outfit', sans-serif; }
        
        .wonders-banner {
            width: 100%; height: 250px; display: flex; overflow-x: auto; gap: 15px; padding: 20px; 
            background: #fff; box-sizing: border-box;
        }
        .wonders-banner img {
            height: 100%; border-radius: 20px; object-fit: cover; width: 350px; 
            border: 4px solid #f0f0f0; transition: 0.4s; flex-shrink: 0;
        }
        .wonders-banner img:hover { border-color: var(--pink); transform: translateY(-5px); }

        header { padding: 40px 20px; text-align: center; }
        h1 { 
            font-family: 'Playfair Display', serif; font-size: clamp(3rem, 10vw, 5rem); margin: 0; 
            background: linear-gradient(to right, var(--pink), var(--violet));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 100px; }
        .input-card {
            background: white; border: 2px solid #f0f0f0; padding: 30px; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); margin-bottom: 50px;
        }
        textarea {
            width: 100%; height: 80px; background: transparent; border: none; 
            color: #333; font-size: 1.4rem; outline: none; resize: none; font-family: inherit;
        }
        .publish-btn {
            background: linear-gradient(45deg, var(--pink), var(--violet));
            color: white; border: none; padding: 15px 45px; border-radius: 50px;
            font-weight: 800; cursor: pointer; float: right; transition: 0.3s;
        }
        .feed-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .moment-card {
            background: #fff; border: 1px solid #f0f0f0; padding: 25px; border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02); border-top: 5px solid var(--violet);
        }
        .card-footer { font-size: 0.7rem; color: var(--pink); font-weight: 800; margin-top: 15px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="wonders-banner">
    <img src="https://images.unsplash.com/photo-1564507592333-c60657451dd7?w=800" alt="Taj Mahal">
    <img src="https://images.unsplash.com/photo-1587595431973-160d0d94add1?w=800" alt="Great Wall">
    <img src="https://images.unsplash.com/photo-1526392060635-9d6019884377?w=800" alt="Machu Picchu">
    <img src="https://images.unsplash.com/photo-1599933333158-958253683f51?w=800" alt="Colosseum">
    <img src="https://images.unsplash.com/photo-1548115184-bc6544d06a58?w=800" alt="Petra">
    <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=800" alt="Chichen Itza">
    <img src="https://images.unsplash.com/photo-1591533512217-0630b9609f67?w=800" alt="Christ the Redeemer">
</div>

<header>
    <h1>HighMoments</h1>
    <p style="color: var(--violet); font-weight: 600; letter-spacing: 2px;">WORLD WONDER EDITION</p>
</header>

<div class="container">
    <div class="input-card">
        <textarea id="momentInput" placeholder="What's your wonder today?"></textarea>
        <button class="publish-btn" onclick="publish()">SAVE MOMENT</button>
        <div style="clear:both;"></div>
    </div>
    <div id="feed" class="feed-grid"></div>
</div>

<script>
    const supabase = lib.createClient('https://qbkyjuygpcusvxnjlgyr.supabase.co', 'sb_publishable_RbRR4Pn2afNtc0Uaa2CsNw_Ordgv_7T');

    async function load() {
        const { data } = await supabase.from('moments').select('*').order('id', { ascending: false });
        if (data) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            data.forEach(m => {
                const card = document.createElement('div');
                card.className = 'moment-card';
                card.innerHTML = `<p>${m.text}</p><div class="card-footer">GLOBAL ARCHIVE</div>`;
                feed.appendChild(card);
            });
        }
    }

    async function publish() {
        const input = document.getElementById('momentInput');
        const val = input.value;
        if (!val.trim()) return;
        const { error } = await supabase.from('moments').insert([{ text: val }]);
        if (!error) { input.value = ''; load(); }
    }
    load();
</script>

</body>
</html>
