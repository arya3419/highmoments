<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HighMoments | Global Wonders</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink: #ff007f; 
            --violet: #7000ff; 
        }
        
        body { 
            margin: 0; padding: 0; 
            background-color: #ffffff; /* Pure White Background */
            color: #1a1a1a;
            font-family: 'Outfit', sans-serif;
        }

        /* 7 Wonders Scenery Strip */
        .wonders-banner {
            width: 100%;
            height: 250px;
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 0;
            background: #f8f8f8;
        }

        .wonders-banner img {
            height: 100%;
            border-radius: 15px;
            object-fit: cover;
            width: 300px;
            border: 3px solid transparent;
            transition: 0.3s;
        }
        
        .wonders-banner img:hover { border-color: var(--pink); transform: scale(0.95); }

        header {
            padding: 60px 20px;
            text-align: center;
            background: white;
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 5rem); margin: 0; 
            background: linear-gradient(to right, var(--pink), var(--violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px 100px; }

        /* Pink & Violet Styled Input on White */
        .input-card {
            background: white;
            border: 2px solid #f0f0f0;
            padding: 30px; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            margin-top: -30px;
            position: relative;
            z-index: 10;
        }

        textarea {
            width: 100%; height: 80px; background: transparent;
            border: none; color: #333; font-size: 1.3rem;
            outline: none; resize: none; font-family: inherit;
        }

        .publish-btn {
            background: linear-gradient(45deg, var(--pink), var(--violet));
            color: white; border: none;
            padding: 15px 40px; border-radius: 50px;
            font-weight: 800; cursor: pointer; float: right;
            transition: 0.3s;
        }

        /* Story Cards */
        .feed-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; margin-top: 50px; 
        }

        .moment-card {
            background: #fff;
            border: 1px solid #eee;
            padding: 25px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            border-left: 5px solid var(--violet);
        }

        .card-footer { font-size: 0.7rem; color: var(--pink); font-weight: 800; margin-top: 10px; }

    </style>
</head>
<body>

<div class="wonders-banner">

    <img src="https://images.unsplash.com/photo-1526392060635-9d6019884377?w=500" alt="Machu Picchu">

    <img src="https://images.unsplash.com/photo-1548115184-bc6544d06a58?w=500" alt="Petra">
    <img src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=500" alt="Chichen Itza">
    <img src="https://images.unsplash.com/photo-1591533512217-0630b9609f67?w=500" alt="Christ the Redeemer">
</div>

    <div id="feed" class="feed-grid"></div>
