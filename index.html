<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HighMoments | Travel Your Soul</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pink: #ec4899; 
            --violet: #8b5cf6; 
            --glass: rgba(255, 255, 255, 0.1); 
        }
        
        body, html { 
            margin: 0; padding: 0; min-height: 100%; 
            font-family: 'Outfit', sans-serif;
            background: #000; color: white;
        }

        /* Full Page Scenery Background */
        .bg-scenery {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(rgba(139, 92, 246, 0.3), rgba(236, 72, 153, 0.3)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            height: 45vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 12vw, 7rem); margin: 0; 
            background: linear-gradient(to right, #f472b6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(236, 72, 153, 0.3));
        }

        .tagline { font-size: 0.8rem; letter-spacing: 6px; text-transform: uppercase; color: #fbcfe8; margin-bottom: 10px; font-weight: 800; }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 100px; }

        /* Pink & Violet Glass Input */
        .input-card {
            background: rgba(139, 92, 246, 0.15);
            backdrop-filter: blur(30px);
            border: 2px solid rgba(236, 72, 153, 0.3);
            padding: 40px; border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            margin-top: -40px;
        }

        textarea {
            width: 100%; height: 100px; background: transparent;
            border: none; color: white; font-size: 1.4rem;
            outline: none; resize: none; font-family: inherit;
        }

        .publish-btn {
            background: linear-gradient(45deg, var(--pink), var(--violet));
            color: white; border: none;
            padding: 18px 50px; border-radius: 50px;
            font-weight: 800; cursor: pointer; float: right;
            transition: 0.3s; font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(236, 72, 153, 0.4);
        }

        .publish-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(139, 92, 246, 0.5); }

        /* Decorated Story Feed */
        .feed-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 30px; margin-top: 80px; 
        }

        .moment-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 30px;
            transition: 0.4s;
            border-bottom: 5px solid var(--violet);
        }

        .moment-card:hover { 
            transform: scale(1.03); 
            border-bottom: 5px solid var(--pink);
            background: rgba(255, 255, 255, 0.1);
        }

        .moment-card p { font-size: 1.2rem; line-height: 1.6; margin-bottom: 15px; font-weight: 300; }

        .card-footer { font-size: 0.7rem; color: var(--pink); font-weight: 800; letter-spacing: 2px; }

        footer { text-align: center; padding: 50px; opacity: 0.6; font-size: 0.7rem; color: var(--violet); }
    </style>
</head>
<body>

<div class="bg-scenery"></div>

<header>
    <div class="tagline">A Soul's Journey</div>
    <h1>HighMoments</h1>
</header>

<div class="container">
    <div class="input-card">
        <textarea id="momentInput" placeholder="What moved you today?"></textarea>
        <button class="publish-btn" onclick="publish()">SHARE JOY</button>
        <div style="clear:both;"></div>
    </div>

    <div id="feed" class="feed-grid"></div>
</div>

<footer>CREATED FOR THE PUBLIC DOMAIN • CC0 2026</footer>

<script>
    const supabase = lib.createClient('https://qbkyjuygpcusvxnjlgyr.supabase.co', 'sb_publishable_RbRR4Pn2afNtc0Uaa2CsNw_Ordgv_7T');

    async function load() {
        const { data } = await supabase.from('moments').select('*').order('id', { ascending: false });
        if (data) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            data.forEach(m => {
                const card = document.createElement('div');
                card.className = 'moment-card';
                card.innerHTML = `<p>${m.text}</p><div class="card-footer">PUBLIC RECORD</div>`;
                feed.appendChild(card);
            });
        }
    }

    async function publish() {
        const input = document.getElementById('momentInput');
        const val = input.value;
        if (!val.trim()) return;
        
        const { error } = await supabase.from('moments').insert([{ text: val }]);
        if (!error) {
            input.value = '';
            load();
        }
    }
    load();
</script>

</body>
</html>
