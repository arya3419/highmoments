<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HighMoments | Public Joy</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #6366f1; --secondary: #ec4899; --bg: #fdfcfb; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%); padding: 60px 20px; text-align: center; color: white; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); }
        .container { max-width: 600px; margin: -50px auto 0; width: 90%; }
        .glass-panel { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 100px; border: 2px solid #f1f5f9; border-radius: 15px; padding: 15px; font-size: 1rem; outline: none; font-family: inherit; box-sizing: border-box; }
        button { width: 100%; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 15px; }
        .moment-card { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--secondary); animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>
    <header><h1>HighMoments</h1><p>Stored Forever • Public Domain</p></header>
    <div class="container">
        <div class="glass-panel">
            <textarea id="momentInput" placeholder="What's a happy movement from today?"></textarea>
            <button onclick="publish()">SAVE TO PUBLIC VAULT</button>
        </div>
        <div id="feed"></div>
    </div>

    <script>
        // These are your unique keys from your Supabase dashboard
        const supabase = lib.createClient('https://qbkyjuygpcusvxnjlgyr.supabase.co', 'sb_publishable_RbRR4Pn2afNtc0Uaa2CsNw_Ordgv_7T');

        async function load() {
            const { data } = await supabase.from('moments').select('*').order('id', { ascending: false });
            if (data) {
                const feed = document.getElementById('feed');
                feed.innerHTML = '';
                data.forEach(m => {
                    card.className = 'moment-card';
                    const card = document.createElement('div');
                    card.innerHTML = `<p>${m.text}</p><small style="color:#94a3b8">Public Domain Record</small>`;
                    feed.appendChild(card);
                });
            }
        }

        async function publish() {
            const val = document.getElementById('momentInput').value;
            if (!val.trim()) return;
            const { error } = await supabase.from('moments').insert([{ text: val }]);
            if (!error) {
                document.getElementById('momentInput').value = '';
                load();
            } else { alert("Make sure you created the 'moments' table in Supabase!"); }
        }
        load();
    </script>
</body>
</html>
